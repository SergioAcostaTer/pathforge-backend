spring:
  application:
    name: pathforge-backend
  output:
    ansi:
      enabled: always

  jackson:
    property-naming-strategy: SNAKE_CASE
    default-property-inclusion: non_null

server:
  port: ${SERVER_PORT:8080}

fal:
  api-key: ${FAL_API_KEY}
  base-url: ${FAL_BASE_URL:https://fal.run}
  model: ${FAL_MODEL:fal-ai/nano-banana/edit}

storage:
  r2:
    bucket: ${R2_BUCKET}
    endpoint: ${R2_ENDPOINT}
    access-key: ${R2_ACCESS_KEY}
    secret-key: ${R2_SECRET_KEY}

logging:
  level:
    com.pathforge: INFO
    software.amazon.awssdk: WARN

pathforge:
  avatar:
    default-prompt: >-
      transform this person into a 3D cartoon avatar,
      preserve the exact face and identity of the person,
      upper body portrait, shoulders and chest visible,
      slightly cartoonish stylized features, mildly expressive eyes,
      smooth stylized skin, subtle cartoon proportions,
      dark navy blazer over white t-shirt,
      subtle confident smile,
      soft warm studio lighting,
      pure white background,
      high quality polished 3D render, professional app avatar
    negative-prompt: >-
      photorealistic,
      hyperrealistic,
      full body,
      overly exaggerated cartoon,
      extreme Pixar proportions,
      harsh shadows,
      flat illustration,
      2D,
      anime,
      distorted face,
      blurry,
      watermark,
      text
