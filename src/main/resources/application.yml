spring:
  application:
    name: pathforge-backend
  output:
    ansi:
      enabled: always

  jackson:
    property-naming-strategy: SNAKE_CASE
    default-property-inclusion: non_null

server:
  port: ${SERVER_PORT:8080}

fal:
  api-key: ${FAL_API_KEY}
  base-url: ${FAL_BASE_URL:https://fal.run}
  model: ${FAL_MODEL:fal-ai/nano-banana/edit}

storage:
  r2:
    bucket: ${R2_BUCKET}
    endpoint: ${R2_ENDPOINT}
    access-key: ${R2_ACCESS_KEY}
    secret-key: ${R2_SECRET_KEY}

logging:
  level:
    com.pathforge: INFO
    software.amazon.awssdk: WARN

pathforge:
  avatar:
    default-style: PIXAR
