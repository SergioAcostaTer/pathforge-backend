spring:
  application:
    name: pathforge-backend

  jackson:
    property-naming-strategy: SNAKE_CASE
    serialization:
      write-dates-as-timestamps: false

  # ---------------------------------------------------------------------------
  # JPA / Datasource — values supplied via environment variables.
  # For local development, activate the 'local' profile (see application-local.yml).
  # ---------------------------------------------------------------------------
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: ${SERVER_PORT:8080}

# ---------------------------------------------------------------------------
# Fal.ai configuration — all secrets via environment variables, no defaults.
# ---------------------------------------------------------------------------
fal:
  api-key: ${FAL_API_KEY}
  base-url: ${FAL_BASE_URL:https://fal.run}
  model: ${FAL_MODEL:fal-ai/flux/dev}

# ---------------------------------------------------------------------------
# Cloudflare R2 storage configuration (AWS S3-compatible)
# ---------------------------------------------------------------------------
storage:
  r2:
    bucket: ${R2_BUCKET}
    endpoint: ${R2_ENDPOINT}
    access-key: ${R2_ACCESS_KEY}
    secret-key: ${R2_SECRET_KEY}

logging:
  level:
    com.pathforge: INFO
    software.amazon.awssdk: WARN
