spring:
  application:
    name: pathforge-backend
  output:
    ansi:
      enabled: always

  jackson:
    property-naming-strategy: SNAKE_CASE
    default-property-inclusion: non_null

server:
  port: ${SERVER_PORT:8080}

fal:
  api-key: ${FAL_API_KEY}
  base-url: ${FAL_BASE_URL:https://fal.run}
  model: ${FAL_MODEL:fal-ai/nano-banana/edit}

storage:
  r2:
    bucket: ${R2_BUCKET}
    endpoint: ${R2_ENDPOINT}
    access-key: ${R2_ACCESS_KEY}
    secret-key: ${R2_SECRET_KEY}

logging:
  level:
    com.pathforge: INFO
    software.amazon.awssdk: WARN

pathforge:
  avatar:
    default-prompt: >-
      transform this person into a stylized 3D avatar,
      keep the exact face and identity of the person,
      upper body portrait, shoulders and chest visible,
      semi-realistic proportions, slightly stylized features,
      smooth clean skin, natural eye size,
      dark navy blazer over white t-shirt,
      subtle confident smile,
      soft warm studio lighting,
      transparent background,
      high quality polished 3D render, professional avatar
    negative-prompt: >-
      photorealistic,
      overly cartoon,
      exaggerated eyes,
      toy figurine,
      full body,
      harsh shadows,
      flat illustration,
      2D,
      anime,
      distorted face,
      blurry,
      watermark,
      text
