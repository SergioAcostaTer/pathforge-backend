spring:
  application:
    name: pathforge-backend

  jackson:
    property-naming-strategy: SNAKE_CASE
    default-property-inclusion: non_null

server:
  port: ${SERVER_PORT:8080}

fal:
  api-key: ${FAL_API_KEY}
  base-url: ${FAL_BASE_URL:https://fal.run}
  model: ${FAL_MODEL:fal-ai/flux/dev}

storage:
  r2:
    bucket: ${R2_BUCKET}
    endpoint: ${R2_ENDPOINT}
    access-key: ${R2_ACCESS_KEY}
    secret-key: ${R2_SECRET_KEY}

logging:
  level:
    com.pathforge: INFO
    software.amazon.awssdk: WARN

pathforge:
  avatar:
    default-prompt: >-
      3D animated character portrait in Pixar/Disney render quality.
      Faithfully preserve the subject's exact facial structure, skin tone, hair color,
      hair style, eye color, and all distinctive physical features from the reference photo.
      Waist-up composition, perfectly centered on a uniform soft light gray background (#EBEBEB).
      Three-point studio lighting: soft key light from upper left, gentle fill from right,
      subtle blue rim light from behind. No harsh shadows.
      Casual modern everyday outfit in neutral muted tones.
      Smooth 3D surface shading, clean strong outlines, large expressive eyes, high-fidelity face detail.
      Vibrant yet natural color palette. No text, no watermark, no artifacts.
