spring:
  application:
    name: pathforge-backend
  output:
    ansi:
      enabled: always

  jackson:
    property-naming-strategy: SNAKE_CASE
    default-property-inclusion: non_null

server:
  port: ${SERVER_PORT:8080}

fal:
  api-key: ${FAL_API_KEY}
  base-url: ${FAL_BASE_URL:https://fal.run}
  model: ${FAL_MODEL:fal-ai/nano-banana/edit}

storage:
  r2:
    bucket: ${R2_BUCKET}
    endpoint: ${R2_ENDPOINT}
    access-key: ${R2_ACCESS_KEY}
    secret-key: ${R2_SECRET_KEY}

logging:
  level:
    com.pathforge: INFO
    software.amazon.awssdk: WARN

pathforge:
  avatar:
    default-prompt: >-
      transform this person into a 3D Pixar-style cartoon avatar,
      keep the face and identity of the person,
      upper body portrait with arms crossed,
      dark navy blazer over white t-shirt,
      subtle confident smile,
      soft warm studio lighting,
      transparent background,
      smooth stylized 3D render,
      highly detailed face,
      clean polished professional profile picture
    negative-prompt: >-
      full body,
      sitting,
      hands at sides,
      different outfit,
      harsh shadows,
      flat illustration,
      2D,
      anime,
      distorted face,
      blurry,
      extra limbs,
      bad anatomy,
      dark background,
      busy background,
      watermark,
      text
