spring:
  application:
    name: pathforge-backend

  jackson:
    property-naming-strategy: SNAKE_CASE
    default-property-inclusion: non_null

server:
  port: ${SERVER_PORT:8080}

fal:
  api-key: ${FAL_API_KEY}
  base-url: ${FAL_BASE_URL:https://fal.run}
  model: ${FAL_MODEL:fal-ai/flux/dev}

storage:
  r2:
    bucket: ${R2_BUCKET}
    endpoint: ${R2_ENDPOINT}
    access-key: ${R2_ACCESS_KEY}
    secret-key: ${R2_SECRET_KEY}

logging:
  level:
    com.pathforge: INFO
    software.amazon.awssdk: WARN

pathforge:
  avatar:
    default-prompt: >-
      professional stylized avatar portrait of the same person,
      front facing,
      neutral expression,
      shoulders visible,
      centered composition,
      soft studio lighting,
      clean minimal gradient background,
      modern product design style,
      smooth skin shading,
      high quality digital illustration,
      symmetrical face,
      consistent lighting,
      professional app avatar
    negative-prompt: >-
      side view,
      profile,
      open mouth,
      smiling widely,
      exaggerated cartoon,
      distorted face,
      extra eyes,
      extra mouth,
      bad anatomy,
      blurry,
      noise,
      shadow on face,
      dramatic lighting
